- abstract: "Advances in measurement technology have led to the generation of increasingly\n\
    large data sets across various scientific fields. Data that capture the variability\n\
    of the underlying system or process, such as single-cell or imaging data, are\n\
    particularly interesting. However, calibrating computational models to explain\n\
    this type of data remains challenging.\nWe interpret the model calibration as
    a Stochastic Inverse Problem (SIP), where\nthe measurements are interpreted as
    probabilistic samples. Our new SIP solu-\ntion approach, Eulerian Parameter Inference
    (EPI), only requires data with high\nvariability and a deterministic simulation
    model that maps model parameters\nto simulation results. EPI solves the SIP through
    a change of variables. This\ncomputationally efficient approach allows for direct
    and point-wise evaluation\nof parameter densities without ever inverting the simulation
    model. The result-\ning parameter distribution captures data variability completely,
    enabling full\ndata reconstruction. Further, estimating multivariate model parameters
    can be\nreduced to a series of one-dimensional problems under the assumption of
    stochas-\ntically independent parameters. Particularly for complex simulation
    models and\ninvolved problems, this property is vital.\nWith EPI, we explain 1)
    annual average temperature data of 3 168 weather sta-\ntions around the world
    with an arithmetic model, 2) German district-specific\nCOVID-19 infection data
    through a differential equation model, and 3) artificial\ndata generated via a
    partial differential equation model with independent param-\neters. With a robust
    mathematical foundation and an easily accessible Python\npackage, we provide a
    versatile solution framework for integrating data with high\nvariability into
    simulation models that promotes application to various research\nquestions."
