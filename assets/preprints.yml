  pubmed: nan
  qualiperf_funding: true
  title: 'Insights into Intestinal P-glycoprotein Function using Talinolol: A PBPK
    Modeling Approach'
- abstract: Multiscale modeling requires the coupling of models on different 
    scales, often based on different mathematical approaches and developed by 
    different research teams. This poses many challenges, such as defining 
    interfaces for coupling, reproducible exchange of submodels, efficient 
    simulation of the models, or reproducibility of results. Here, we present a 
    multiscale digital twin of the liver that couples a partial differential 
    equation (PDE)-based porous media approach for the hepatic lobule with 
    cellular-scale ordinary differential equation (ODE)-based models. The models
    based on the theory of porous media describe transport, tissue mechanical 
    properties, and deformations at the lobular scale, while the cellular models
    describe hepatic metabolism in terms of drug metabolism and damage in terms 
    of necrosis. The resulting multiscale model of the liver was used to 
    simulate perfusion-zonation-function relationships in the liver spanning 
    scales from single cell to the lobulus. The model was applied to study the 
    effects of (i) protein zonation patterns (metabolic zonation) and (ii) drug 
    concentration dependence on spatially heterogeneous liver damage in the form
    of necrosis. Depending on the zonation pattern, different liver damage 
    patterns could be reproduced, including periportal and pericentral necrosis 
    as seen in drug-induced liver injury (DILI). Increasing the drug 
    concentration led to an increase in the observed damage pattern. A key point
    for the success was the integration of domain-specific simulators based on 
    standard exchange formats, i.e., libroadrunner for the high-performance 
    simulation of ODE-based systems and FEBio for the simulation of the 
    continuum-biomechanical part. This allows a standardized and reproducible 
    exchange of cellular scale models in the Systems Biology Markup Language 
    (SBML) between research groups.
  authors: Steffen Gerhäusser, Lena Lambers, Luis Mandl, Julian Franquinet, Tim 
    Ricken, Matthias König
  doi: '-'
