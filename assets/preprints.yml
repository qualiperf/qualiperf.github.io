  title: 'SED-ML Validator: tool for debugging simulation experiments'
- abstract: "ABSTRACT2\nComputational models in systems biology and systems medicine
    are typically simulated using a single formalism such as ordinary differential
    equations (ODE). However, more complex models require the coupling of multiple
    formalisms since different biological phenomena are better described by different
    methods. For example, metabolism in steady state is often modeled using flux-balance
    analysis (FBA) whereas dynamic changes of model components are better described
    via ODEs. The coupling of FBA and ODE modeling formalisms results in dynamic FBA
    models. A major challenge is how to describe such hybrid models that couple multiple
    formalisms in a standardized way so that they can be exchanged between tools and
    simulated consistently in a reproducible manner. This paper presents a scheme
    for encoding and implementation of dynamic FBA models in the Systems Biology Markup
    Language (SBML), thereby enabling the exchange of multi-framework computational
    models between software tools. We demonstrate the feasibility of the approach
    using various example models and show that different tools are able to simulate
    the hybrid models and agree on the results. As part of this work, two independent
    implementations of a multi-framework simulation method for dynamic FBA have been
    developed supporting such models: iBioSim and sbmlutils."
  authors: "Matthias König* , Leandro H. Watanabe, Jan Grzegorzewski, Chris J.\nMyers"
