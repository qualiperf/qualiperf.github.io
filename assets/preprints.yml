  title: A Consensus Model of Glucose-Stimulated Insulin Secretion in the 
    Pancreatic beta-Cell
- abstract: The field of metabolic modelling at the genome-scale continues to 
    grow with more models being created and curated. This comes with an 
    increasing demand for adopting common principles regarding transparency and 
    versioning, in addition to standardisation efforts regarding file formats, 
    annotation and testing. Here, we present a standardised template for 
    git-based and GitHub-hosted genome-scale metabolic models (GEMs) supporting 
    both new models and curated ones, following FAIR principles (findability, 
    accessibility, interoperability, and reusability), and incorporating 
    best-practices. standard-GEM facilitates the reuse of GEMs across web 
    services and platforms in the metabolic modelling field and enables 
    automatic validation of GEMs. The use of this template for new models, and 
    its adoption for existing ones, paves the way for increasing model quality, 
    openness, and accessibility with minimal effort.
  authors: Mihail Anton, Eivind Almaas, Rui Benfeitas, Sara Benito-Vaquerizo, 
