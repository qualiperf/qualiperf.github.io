- abstract: The cytochrome P450 (CYP) superfamily of enzymes plays a critical 
    role in the metabolism of drugs, toxins, and endogenous and exogenous 
    compounds. The activity of CYP enzymes can be influenced by a variety of 
    factors, including genetics, diet, age, environmental factors, and disease. 
    Among the major isoforms, CYP2E1 is of particular interest due to its 
    involvement in the metabolism of various low molecular weight chemicals, 
    including alcohols, pharmaceuticals, industrial solvents, and halogenated 
    anesthetics. Metabolic phenotyping of CYPs based on the elimination of test 
    compounds is a useful method for assessing in vivo activity, with 
    chlorzoxazone being the primary probe drug for phenotyping of CYP2E1. The 
    aim of this work was to investigate the effect of changes in CYP2E1 level 
    and activity, ethanol consumption, ethanol abstinence, and liver impairment 
    on the results of metabolic phenotyping with chlorzoxazone. To accomplish 
    this, an extensive pharmacokinetic dataset for chlorzoxazone was established
    and a physiologically based pharmacokinetic (PBPK) model of chlorzoxazone 
    and its metabolites, 6-hydroxychlorzoxazone and chlorzoxazone-O-glucuronide,
    was developed and validated. The model incorporates the effect of ethanol 
    consumption on CYP2E1 levels and activity by extending the model with a core
    ethanol pharmacokinetic model and a CYP2E1 turnover model. The model 
    accurately predicts pharmacokinetic data from several clinical studies and 
    is able to estimate the effect of changes in CYP2E1 levels and activity on 
    chlorzoxazone pharmacokinetics. Regular ethanol consumption induces CYP2E1 
    over two to three weeks, resulting in increased conversion of chlorzoxazone 
    to 6-hydroxychlorzoxazone and a higher 6-hydroxychlorzoxazone/chlorzoxazone 
    metabolic ratio. After ethanol withdrawal, CYP2E1 levels return to baseline 
    within one week. Importantly, liver impairment has an opposite effect, 
    resulting in reduced liver function via CYP2E1. In alcoholics with liver 
    impairment who also consume ethanol, these factors will have opposite 
    confounding effects on metabolic phenotyping with chlorzoxazone.
  authors: J. Küttner, J. Grzegorzewski, HM. Tautenhahn, M. König
  doi: 10.1101/2023.04.12.536571
  journal: 'bioRxiv 2023.04.12.536571; doi: https://doi.org/10.1101/2023.04.12.536571'
  preprint: true
  pubmed: nan
  qualiperf_funding: true
  title: A physiologically based pharmacokinetic model for CYP2E1 phenotyping 
    via chlorzoxazone
- abstract: 'Talinolol is a cardioselective beta-blocker used in the treatment of
    various cardiovascular diseases and tachyarrhythmias. Its intestinal absorption
    is determined by uptake by the organic anion transporting polypeptide 2B1 (OATP2B1)
    and efflux via P-glycoprotein (P-gp). Talinolol can be taken up via OATP1B1 in
    the liver, where it enters the enterohepatic circulation. Talinolol is excreted
    unchanged in the urine and feces. Talinolol is widely used as a probe drug for
    the intestinal efflux transporter P-gp, which plays a critical role in protecting
    against potentially toxic substances and facilitating the elimination of xenobiotics.
    In this work, an extensive database of talinolol pharmacokinetics was established
    and used to develop and validate a physiologically based pharmacokinetic (PBPK)
    model of talinolol for P-gp phenotyping. The model was used to investigate the
    influence of several factors on talinolol pharmacokinetics: (i) inhibition of
    P-gp via drug-drug interaction; (i) genetic polymorphisms of P-gp; (iii) activity
    of OATP2B1 and OATP1B1; (iv) effect of disease, namely hepatic and renal impairment;
    and (v) site-specific distribution of P-gp and OATP2B1 in the intestine. The model
    accurately predicts the concentration-time profile of talinolol after oral and
    intravenous administration of single and multiple dosing. Furthermore, the model
    accurately describes the effect of genetic variants of P-gp on the pharmacokinetics
    of talinolol, the effect of inhibition of P-gp, the effect of renal impairment,
    as well as site-specific infusion of talinolol in the intestine. The detailed
    description of the intestinal absorption of talinolol and the predictions of talinolol
    pharmacokinetics as a function of hepatorenal impairment provide valuable clinical
    insights for metabolic phenotyping with talinolol. Both the model and the database
    are freely available for reuse.'
  authors: Beatrice Stemmer Mallol, Jan Grzegorzewski, Matthias König
  doi: '-'
