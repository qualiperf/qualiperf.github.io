  pubmed: '-'
  qualiperf_funding: true
  title: Joint zonated quantification of multiple parameters in hepatic lobules
- abstract: Genome scale metabolic models (GEMs) and other constraint-based 
    models (CBMs) play a pivotal role in understanding biological phenotypes and
    advancing research in areas like metabolic engineering, human disease 
    modelling, drug discovery, and personalized medicine. Despite their growing 
    application, a significant challenge remains in ensuring the reproducibility
    of GEMs, primarily due to inconsistent reporting and inadequate model 
    documentation of model results. Addressing this gap, we introduce FROG 
    analysis, a community driven initiative aimed at standardizing 
    reproducibility assessments of CBMs and GEMs. The FROG framework encompasses
    four key analyses including Flux variability, Reaction deletion, Objective 
    function, and Gene deletion to produce standardized, numerically 
    reproducible FROG reports. These reports serve as reference datasets, 
    enabling model evaluators, curators, and independent researchers to verify 
    the reproducibility of GEMs systematically. BioModels, a leading repository 
    of systems biology models, has integrated FROG analysis into its curation 
    workflow, enhancing the reproducibility and reusability of submitted GEMs. 
    In our study evaluating 65 GEM submissions from the community, approximately
    40% reproduced without intervention, 28% requiring minor adjustments, and 
    32% needing input from authors. The standardization introduced by FROG 
    analysis facilitated the detection and resolution of issues, ultimately 
    leading to the successful reproduction of all models. By establishing a 
    standardized and comprehensive approach to evaluating GEM reproducibility, 
    FROG analysis significantly contributes to making CBMs and GEMs more 
    transparent, reusable, and reliable for the broader scientific community.
