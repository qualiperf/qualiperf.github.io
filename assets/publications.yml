    mouse and humans
- abstract: 'Metabolic zonation refers to the spatial separation of metabolic functions
    along the sinusoidal axes of the liver. This phenomenon forms the foundation for
    adjusting hepatic metabolism to physiological requirements in health and disease
    (e.g., metabolic dysfunction-associated steatotic liver disease/MASLD). Zonated
    metabolic functions are influenced by zonal morphological abnormalities in the
    liver, such as periportal fibrosis and pericentral steatosis. We aim to analyze
    the interplay between microperfusion, oxygen gradient, fat metabolism and resulting
    zonated fat accumulation in a liver lobule. Therefore we developed a continuum
    biomechanical, tri-phasic, bi-scale, and multicomponent in silico model, which
    allows to numerically simulate coupled perfusion-function-growth interactions
    two-dimensionally in liver lobules. The developed homogenized model has the following
    specifications: (i) thermodynamically consistent, (ii) tri-phase model (tissue,
    fat, blood), (iii) penta-substances (glycogen, glucose, lactate, FFA, and oxygen),
    and (iv) bi-scale approach (lobule, cell). Our presented in silico model accounts
    for the mutual coupling between spatial and time-dependent liver perfusion, metabolic
    pathways and fat accumulation. The model thus allows the prediction of fat development
    in the liver lobule, depending on perfusion, oxygen and plasma concentration of
    free fatty acids (FFA), oxidative processes, the synthesis and the secretion of
    triglycerides (TGs). The use of a bi-scale approach allows in addition to focus
    on scale bridging processes. Thus, we will investigate how changes at the cellular
    scale affect perfusion at the lobular scale and vice versa. This allows to predict
    the zonation of fat distribution (periportal or pericentral) depending on initial
    conditions, as well as external and internal boundary value conditions.'
  authors: Lena Lambers, Navina Waschinsky, Jana Schleicher, Matthias König, 
