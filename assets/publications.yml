  title: 'The simulation experiment description markup language (SED-ML): language
    specification for level 1 version 5'
- abstract: Extended liver resection carries the risk of post-surgery liver 
    failure involving throm-bospondin-1-mediated aggravation of hepatic 
    epithelial plasticity and function. Mesenchymal stromal cells (MSC) by 
    interfering with thrombospondin-1 (THBS1) counteract hepatic dysfunc-tion, 
    though associated mechanisms remain unknown. Here, two-thirds partial 
    hepatectomy in the mouse increases hepatic THBS1, downstream transforming 
    growth factor-β, and perturbation of liver tissue homeostasis, all of which 
    is ameliorated by hepatic transfusion of human bone mar-row-derived MSC. 
    Treatment attenuates platelet and macrophage recruitment to the liver, both 
    major sources of THBS1. By mitigating THBS1, MSC mute surgery-induced tissue
    deterioration and dysfunction, and thus support post-hepatectomy 
    regeneration. After liver surgery, patients display increased tissue THBS1, 
    which is associated with functional impairment and may indicate a higher 
    risk of post-surgery complications. Since liver dysfunction involving THBS1 
    improves by MSC treatment in various animal models, it seems feasible to 
    modulate THBS1 also in humans to impede post-surgery acute liver failure.
