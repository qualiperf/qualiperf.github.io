  pubmed: nan
  qualiperf_funding: true
  title: "Uncertainty with Varying Subsurface Permeabilities Reduced\nUsing Coupled
    Random Field and Extended Theory of Porous\nMedia Contaminant Transport Models"
- abstract: "The simulation of contaminant transport through the vadose zone enjoys
    high significance\nfor decision makers and contaminated site planners since the
    vadose zone can serve as a filter, but many contaminants can be transported from
    this region to aquifers. The intention of this paper is to utilize the extended
    Theory of Porous Media (eTPM) to develop a ternary model for the simulation of
    contaminant transport in the vadose zone whose application is subsequently shown
    via a numerical example. The simulation was conducted for 140 days, during which
    the contamination source was removed after 25 days. The results indicate that
    the contaminant reached the water table after 76 days. The concentration of the
    contaminant reaching the groundwater was 17% less than that of the contaminant
    source."
