  title: 'SimLivA – Modelling ischemia reperfusion injury in the liver: A first step
    towards a clinical decision support tool.'
- abstract: 'There is a lack of systematic research exploring cross-species variation
    in liver lobular geometry and zonation patterns of critical drug-metabolizing
    enzymes, a knowledge gap essential for translational studies. This study investigated
    the critical interplay between lobular geometry and key cytochrome P450 (CYP)
    zonation in four species: mouse, rat, pig, and human. We developed an automated
    pipeline based on whole slide images (WSI) of hematoxylin-eosin-stained liver
    sections and immunohistochemistry. This pipeline allows accurate quantification
    of both lobular geometry and zonation patterns of essential CYP proteins. Our
    analysis of CYP zonal expression shows that all CYP enzymes (besides CYP2D6 with
    panlobular expression) were observed in the pericentral region in all species,
    but with distinct differences. Comparison of normalized gradient intensity shows
    a high similarity between mice and humans, followed by rats. Specifically, CYP1A2
    was expressed throughout the pericentral region in mice and humans, whereas it
    was restricted to a narrow pericentral rim in rats and showed a panlobular pattern
    in pigs. Similarly, CYP3A4 is present in the pericentral region, but its extent
    varies considerably in rats and appears panlobular in pigs. CYP2D6 zonal expression
    consistently shows a panlobular pattern in all species, although the intensity
    varies. CYP2E1 zonal expression covered the entire pericentral region with extension
    into the midzone in all four species, suggesting its potential for further cross-species
    analysis. Analysis of lobular geometry revealed an increase in lobular size with
    increasing species size, whereas lobular compactness was similar. Based on our
    results, zonated CYP expression in mice is most similar to humans. Therefore,
    mice appear to be the most appropriate species for drug metabolism studies unless
    larger species are required for other purposes, e.g., surgical reasons. CYP selection
    should be based on species, with CYP2E1 and CYP2D6 being the most preferable to
    compare four species. CYP1A2 could be considered as an additional CYP for rodent
    versus human comparisons, and CYP3A4 for mouse/human comparisons. In conclusion,
    our image analysis pipeline together with suggestions for species and CYP selection
    can serve to improve future cross-species and translational drug metabolism studies.'
  authors: Mohamed Albadry, Jonas Kuettner, Jan Grzegorzewski, Olaf Dirsch, Eva 
