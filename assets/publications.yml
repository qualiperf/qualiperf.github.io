  title: 'Quasi-Entropy Closure: A Fast and Reliable Approach to Close the Moment
    Equations of the Chemical Master Equation'
- abstract: The cytochrome P450 2D6 (CYP2D6) is a key xenobiotic-metabolizing 
    enzyme involved in the clearance of many drugs. Genetic polymorphisms in 
    CYP2D6 contribute to the large inter-individual variability in drug 
    metabolism and could affect metabolic phenotyping of CYP2D6 probe substances
    such as dextromethorphan (DXM). To study this question, we (i) established 
    an extensive pharmacokinetics dataset for DXM; and (ii) developed and 
    validated a physiologically based pharmacokinetic (PBPK) model of 
    dextromethorphan (DXM) and its metabolites dextrorphan (DXO) and dextrorphan
    O-glucuronide (DXO-Glu) based on the data. Drug-gene interactions (DGI) were
    introduced by accounting for changes in CYP2D6 enzyme kinetics depending on 
    activity score (AS), which in combination with AS for individual 
    polymorphisms allowed us to model of CYP2D6 gene variants. Variability in 
    CYP3A4 and CYP2D6 activity was modeled based on in vitro data from human 
    liver microsomes. Model predictions are in very good agreement with 
    pharmacokinetics data for CYP2D6 polymorphisms, CYP2D6 activity as measured 
    by AS, and CYP2D6 metabolic phenotypes (UM, EM, IM, PM). The model was 
    applied to investigate the genotype-phenotype association and the role of 
    CYP2D6 polymorphisms for metabolic phenotyping with dextromethorphan using 
    the urinary cumulative metabolic ratio DXM/(DXO+DXO-Glu) (UCMR). The effect 
    of parameters on UCMR was studied via sensitivity analysis. Model 
    predictions indicate very good robustness against the intervention protocol 
    (i.e. application form, dosing amount, dissolution rate, and sampling time) 
    and good robustness against physiological variation. The model is capable of
    estimating the UCMR dispersion within and across populations depending on 
    activity scores. Moreover, the distribution of UCMR and the risk of 
    genotype-phenotype mismatch could be estimated for populations with known 
    CYP2D6 genotype frequencies. The model can be applied as a tool for 
    individual prediction of UCMR and metabolic phenotype based on CYP2D6 
    genotype. Both, model and database are freely available for reuse.
