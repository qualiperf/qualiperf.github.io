- abstract: "In Bayesian statistics, Highest Posterior Density Regions (HPDR) measure
    the\nuncertainty of parameter estimates at a given credibility level. HPDRs are
    the Bayesian\nversion of Highest Density Intervals (HDI) based on the posterior
    probability. The calculation\nof Percentile Intervals (PI) is a common method
    for approximating HDIs in many popular\nPython toolboxes. The PI calculation differs
    from the HPDR calculation as it ignores the\nposterior probability by simply cutting
    the lower and upper values of the marginalized posterior distribution symmetrically.
    Here, we use the phenomenological retarded transient functions to infer the posterior
    distribution of a clinical dataset. The one-dimensional HPDR projections were
    compared to the PIs for all inferred parameters. The direct comparison revealed
    that the one-dimensional HPDR projections of all inferred parameter posteriors
    exceeded the percentile-based intervals, demonstrating that the PIs were overconfident.
    Overall, we argue that only HPDRs can be interpreted in terms of probability."
