  title: Model order reduction for deformable porous materials in thin domains 
    via asymptotic analysis
- abstract: 'Abstract: In systems biology, biological phenomena are often modeled
    by Ordinary Differential Equations (ODEs) and distributed in the de facto standard
    file format SBML. The primary analyses performed with such models are dynamic
    simulation, steady-state analysis, and parameter estimation. These methodologies
    are mathematically formalized, and libraries for such analyses have been published.
    Several tools exist to create, simulate, or visualize models encoded in SBML.
    However, setting up and establishing analysis environments is a crucial hurdle
    for non-modelers. Therefore, easy access to perform fundamental analyses of ODE
    models is a significant challenge. We developed SBMLWebApp, a web-based service
    to execute SBML-based simulations, steady-state analysis, and parameter estimation
    directly in the browser without the need for any setup or prior knowledge to address
    this issue. SBMLWebApp visualizes the result and numerical table of each analysis
    and provides a download of the results. SBMLWebApp allows users to select and
    analyze SBML models directly from the BioModels Database. Taken together, SBMLWebApp
    provides barrier-free access to an SBML analysis environment for simulation, steady-state
    analysis, and parameter estimation for SBML models. SBMLWebApp is implemented
    in Java™ based on an Apache Tomcat® web server using COPASI, the Systems Biology
    Simulation Core Library (SBSCL), and LibSBMLSim as simulation engines. SBMLWebApp
    is licensed under MIT with source code available from https://github.com/TakahiroYamada/SBMLWebApp.
    The program runs online at http://simulate-biology.org.'
  authors: Takahiro G. Yamada, Kaito Ii, Matthias König, Martina Feierabend, 
    Andreas Dräger, Akira Funahashi
  doi: https://doi.org/10.3390/pr9101830
