  pubmed: '38741151'
  qualiperf_funding: true
  title: Bayesian modelling of time series data (BayModTS)-a FAIR workflow to 
    process sparse and highly variable data
- abstract: Modern biological research is increasingly informed by computational
    simulation experiments, which necessitate the development of methods for 
    annotating, archiving, sharing, and reproducing the conducted experiments. 
    These simulations increasingly require extensive collaboration among 
    modelers, experimentalists, and engineers. The Minimum Information About a 
    Simulation Experiment (MIASE) guidelines outline the information needed to 
    share simulation experiments. SED-ML is a computer-readable format for the 
    information outlined by MIASE, created as a community project and supported 
    by many investigators and software tools. Level 1 Version 5 of SED-ML 
    expands the ability of modelers to define simulations in SED-ML using the 
    Kinetic Simulation Algorithm Onotoloy (KiSAO). While it was possible in 
    Version 4 to define a simulation entirely using KiSAO, Version 5 now allows 
    users to define tasks, model changes, ranges, and outputs using the ontology
    as well. SED-ML is supported by a growing ecosystem of investigators, model 
    languages, and software tools, including various languages for 
    constraint-based, kinetic, qualitative, rule-based, and spatial models, and 
    many simulation tools, visual editors, model repositories, and validators. 
    Additional information about SED-ML is available at https://sed-ml.org/.
  authors: Smith LP, Bergmann FT, Garny A, Helikar T, Karr J, Nickerson D, Sauro
